name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=d4a0a8&color_dots=#e8d5d8,#d4a0a8,#bf6b77,#9e3a4a,#3a2a2e
            dist/github-snake-dark.svg?palette=github-dark&color_snake=d4a0a8&color_dots=#2a1f22,#4a2d34,#7a3a46,#9e3a4a,#bf6b77

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
          force_orphan: true
