name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=ffb6c1&color_dots=#fce4ec,#f8bbd0,#f48fb1,#f06292,#e91e63
            dist/github-snake-dark.svg?palette=github-dark&color_snake=ffb6c1&color_dots=#1a0a0f,#3d1a2a,#7b2d4a,#c2185b,#ffb6c1

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
          force_orphan: true
