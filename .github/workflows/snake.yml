name: 🐍 Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"   # Runs every day at midnight UTC
  workflow_dispatch:        # Lets you run it manually from GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake (light + dark + pink)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=ff9eb5&color_dots=#ffecf0,#ffb6c1,#ff9eb5,#ff69b4,#c2185b
            dist/github-snake-dark.svg?palette=github-dark&color_snake=ff9eb5&color_dots=#2d1b2e,#5c2d4a,#8c3d6a,#c2185b,#ff9eb5

      - name: Push output to `output` branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
